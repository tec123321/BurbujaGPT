name: Apply stopwatch layout hotfix

on:
  push:
    branches:
      - cronometro-flotante
    paths:
      - '.github/workflows/apply-stopwatch-hotfix.yml'

permissions:
  contents: write

jobs:
  apply-hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stopwatch branch
        uses: actions/checkout@v4
        with:
          ref: cronometro-flotante
          fetch-depth: 0

      - name: Fix clipped numbers and widen interval marks
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source_path = Path('stopwatch/src/main/java/com/leonardo/edgestopwatch/StopwatchService.java')
          source = source_path.read_text(encoding='utf-8')

          replacements = [
              (
                  'new LinearLayout.LayoutParams(0, scaledDp(50), 1f));',
                  'new LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f));'
              ),
              (
                  '''copy.addView(value, new LinearLayout.LayoutParams(
                    ViewGroup.LayoutParams.MATCH_PARENT,
                    scaledDp(35)));''',
                  '''copy.addView(value, new LinearLayout.LayoutParams(
                    ViewGroup.LayoutParams.MATCH_PARENT,
                    ViewGroup.LayoutParams.WRAP_CONTENT));'''
              ),
              (
                  '''dividerParams.leftMargin = scaledDp(10);
            dividerParams.rightMargin = scaledDp(10);''',
                  '''dividerParams.leftMargin = scaledDp(10);
            dividerParams.rightMargin = scaledDp(10);
            dividerParams.topMargin = scaledDp(5);
            dividerParams.bottomMargin = scaledDp(5);'''
              ),
              (
                  '''timeParams.height = scaledDp(50);
        timeView.setLayoutParams(timeParams);''',
                  '''timeParams.height = ViewGroup.LayoutParams.WRAP_CONTENT;
        timeView.setLayoutParams(timeParams);
        timeView.setMinimumHeight(scaledDp(64));'''
              ),
              (
                  'timer.rowView.setMinimumHeight(scaledDp(56));',
                  'timer.rowView.setMinimumHeight(scaledDp(72));'
              ),
              (
                  '''valueParams.height = scaledDp(35);
            timer.valueView.setLayoutParams(valueParams);''',
                  '''valueParams.height = ViewGroup.LayoutParams.WRAP_CONTENT;
            timer.valueView.setLayoutParams(valueParams);
            timer.valueView.setMinimumHeight(scaledDp(50));'''
              ),
              (
                  '''float thickness = Math.max(1f, Math.min(scaledDp(2), step * 0.48f));
            float markLength = Math.min(getWidth(), scaledDp(18));''',
                  '''float thickness = Math.max(1f, Math.min(scaledDp(3), step * 0.65f));
            float markLength = Math.min(getWidth(), scaledDp(30));'''
              ),
          ]

          for old, new in replacements:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one match, found {count}: {old[:80]!r}')
              source = source.replace(old, new, 1)

          source_path.write_text(source, encoding='utf-8')

          gradle_path = Path('stopwatch/build.gradle')
          gradle = gradle_path.read_text(encoding='utf-8')
          if "versionCode 5" not in gradle or "versionName '1.4-interval-marks-multi-timers'" not in gradle:
              raise SystemExit('Unexpected stopwatch version in build.gradle')
          gradle = gradle.replace('versionCode 5', 'versionCode 6', 1)
          gradle = gradle.replace(
              "versionName '1.4-interval-marks-multi-timers'",
              "versionName '1.5-layout-fix-wide-marks'",
              1,
          )
          gradle_path.write_text(gradle, encoding='utf-8')

          workflow_path = Path('.github/workflows/build-stopwatch.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          workflow = workflow.replace(
              'Cronometro-Lateral-v1.4-debug-apk',
              'Cronometro-Lateral-v1.5-debug-apk',
              1,
          )
          workflow_path.write_text(workflow, encoding='utf-8')
          PY

      - name: Commit hotfix
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add stopwatch/src/main/java/com/leonardo/edgestopwatch/StopwatchService.java stopwatch/build.gradle .github/workflows/build-stopwatch.yml
          git commit -m 'Fix clipped timer text and widen interval marks [skip hotfix]'
          git push origin HEAD:cronometro-flotante
