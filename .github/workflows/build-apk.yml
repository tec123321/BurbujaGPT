name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Apply V16 display label
        shell: bash
        run: |
          sed -i 's/Globo GPT V15/Globo GPT V16/g' app/src/main/java/com/leonardo/burbujagpt/MainActivity.java

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle assembleDebug > build.log 2>&1
          status=$?
          cat build.log
          exit $status

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Globo-GPT-V16-build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Globo-GPT-V16-superwindow-engine
          path: app/build/outputs/apk/debug/app-debug.apk
