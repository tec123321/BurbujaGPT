name: Build Globo WhatsApp Native APK

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle assembleDebug > build.log 2>&1
          status=$?
          cat build.log
          exit $status

      - name: Verify APK
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -s "$APK"
          unzip -t "$APK" > zip-verification.txt
          sha256sum "$APK" > SHA256SUMS.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Globo-WhatsApp-V3-no-Shizuku-build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Globo-WhatsApp-V3-native-no-Shizuku
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            SHA256SUMS.txt
            zip-verification.txt
          retention-days: 30
