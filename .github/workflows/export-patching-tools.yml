name: Export Android patching tools

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/tool-trigger.txt'
      - '.github/workflows/export-patching-tools.yml'

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect tools
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p exported-tools
          curl -L --fail -o exported-tools/smali.jar \
            https://github.com/baksmali/smali/releases/download/3.0.9/smali-3.0.9-fat-release.jar
          curl -L --fail -o exported-tools/baksmali.jar \
            https://github.com/baksmali/smali/releases/download/3.0.9/baksmali-3.0.9-fat-release.jar
          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          PLATFORM="$(find "$ANDROID_HOME/platforms" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          cp "$BUILD_TOOLS/lib/apksigner.jar" exported-tools/apksigner.jar
          cp "$BUILD_TOOLS/zipalign" exported-tools/zipalign
          cp "$BUILD_TOOLS/d8" exported-tools/d8
          cp "$BUILD_TOOLS/lib/d8.jar" exported-tools/d8.jar
          cp "$PLATFORM/android.jar" exported-tools/android.jar
          chmod +x exported-tools/zipalign exported-tools/d8
          ls -lh exported-tools

      - name: Upload tools
        uses: actions/upload-artifact@v4
        with:
          name: android-patching-tools
          path: exported-tools
          retention-days: 7
