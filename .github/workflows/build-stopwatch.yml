name: Build Edge Stopwatch APK

on:
  push:
    branches:
      - cronometro-flotante
    paths:
      - 'stopwatch/**'
      - 'settings.gradle'
      - '.github/workflows/build-stopwatch.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'stopwatch/**'
      - 'settings.gradle'
      - '.github/workflows/build-stopwatch.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.apk_upload.outputs.artifact-id }}
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: cronometro-flotante

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew :stopwatch:assembleDebug --stacktrace

      - name: Upload APK
        id: apk_upload
        uses: actions/upload-artifact@v4
        with:
          name: Cronometro-Lateral-debug-apk
          path: stopwatch/build/outputs/apk/debug/stopwatch-debug.apk

  report:
    needs: build
    if: always()
    name: artifact-${{ needs.build.outputs.artifact_id }}-result-${{ needs.build.result }}
    runs-on: ubuntu-latest
    steps:
      - name: Report artifact
        run: echo "Artifact ${{ needs.build.outputs.artifact_id }} · ${{ needs.build.result }}"
