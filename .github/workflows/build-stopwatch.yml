name: Build Edge Stopwatch APK

on:
  push:
    branches:
      - cronometro-flotante
    paths:
      - 'stopwatch/**'
      - 'settings.gradle'
      - '.github/workflows/build-stopwatch.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'stopwatch/**'
      - 'settings.gradle'
      - '.github/workflows/build-stopwatch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.apk_upload.outputs.artifact-id }}
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: cronometro-flotante
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Apply layout hotfix
        run: python3 stopwatch/apply_layout_hotfix.py

      - name: Commit source hotfix
        shell: bash
        run: |
          if ! git diff --quiet -- stopwatch/src/main/java/com/leonardo/edgestopwatch/StopwatchService.java; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add stopwatch/src/main/java/com/leonardo/edgestopwatch/StopwatchService.java
            git commit -m 'Apply stopwatch layout fix and wider interval marks'
            git push origin HEAD:cronometro-flotante
          fi

      - name: Build debug APK
        run: gradle :stopwatch:assembleDebug --stacktrace

      - name: Upload APK
        id: apk_upload
        uses: actions/upload-artifact@v4
        with:
          name: Cronometro-Lateral-v1.5-debug-apk
          path: stopwatch/build/outputs/apk/debug/stopwatch-debug.apk

  report:
    needs: build
    if: always()
    name: artifact-${{ needs.build.outputs.artifact_id }}-result-${{ needs.build.result }}
    runs-on: ubuntu-latest
    steps:
      - name: Report artifact
        run: echo "Artifact ${{ needs.build.outputs.artifact_id }} · ${{ needs.build.result }}"
