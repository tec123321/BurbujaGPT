name: Build Edge Stopwatch APK

on:
  push:
    branches:
      - cronometro-flotante
    paths:
      - 'stopwatch/**'
      - 'tools/patch_stopwatch_squares.py'
      - 'tools/patch_stopwatch_border.py'
      - 'tools/patch_stopwatch_v110.py'
      - 'tools/patch_stopwatch_v111.py'
      - 'settings.gradle'
      - '.github/workflows/build-stopwatch.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.apk_upload.outputs.artifact-id }}
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: cronometro-flotante

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build unsigned release APK
        run: gradle :stopwatch:assembleRelease --stacktrace

      - name: Collect APK signing tools
        shell: bash
        run: |
          set -euo pipefail
          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          mkdir -p signing-tools
          cp "$BUILD_TOOLS/lib/apksigner.jar" signing-tools/apksigner.jar
          cp "$BUILD_TOOLS/zipalign" signing-tools/zipalign
          chmod +x signing-tools/zipalign
          cp stopwatch/build/outputs/apk/release/stopwatch-release-unsigned.apk ./Cronometro-Lateral-v1.11-unsigned.apk

      - name: Upload unsigned APK and signing tools
        id: apk_upload
        uses: actions/upload-artifact@v4
        with:
          name: Cronometro-Lateral-v1.11-unsigned-and-tools
          path: |
            Cronometro-Lateral-v1.11-unsigned.apk
            signing-tools/apksigner.jar
            signing-tools/zipalign

  report:
    needs: build
    if: always()
    name: artifact-${{ needs.build.outputs.artifact_id }}-result-${{ needs.build.result }}
    runs-on: ubuntu-latest
    steps:
      - name: Report artifact
        run: echo "Artifact ${{ needs.build.outputs.artifact_id }} · ${{ needs.build.result }}"
