name: Build Edge Stopwatch APK

on:
  push:
    branches:
      - cronometro-flotante
    paths:
      - 'stopwatch/**'
      - 'settings.gradle'
      - '.github/workflows/build-stopwatch.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'stopwatch/**'
      - 'settings.gradle'
      - '.github/workflows/build-stopwatch.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        shell: bash
        run: |
          chmod +x gradlew
          set +e
          ./gradlew :stopwatch:assembleDebug --stacktrace > stopwatch-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 100 stopwatch-build.log
          else
            tail -n 20 stopwatch-build.log
          fi
          exit "$status"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Cronometro-Lateral-build-log
          path: stopwatch-build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cronometro-Lateral-debug-apk
          path: stopwatch/build/outputs/apk/debug/stopwatch-debug.apk
