}

android {
    namespace 'com.leonardo.burbujagpt'
    compileSdk 35

    defaultConfig {
        applicationId 'com.leonardo.burbujagpt'
        minSdk 24
        targetSdk 35
        versionCode 14
        versionName '1.3.1-adaptada-notificaciones'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
