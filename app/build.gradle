}

android {
    namespace 'com.leonardo.globowhatsapp'
    compileSdk 35

    defaultConfig {
        applicationId 'com.leonardo.globowhatsapp'
        minSdk 30
        targetSdk 35
        versionCode 4
        versionName '1.3.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
