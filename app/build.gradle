plugins {
    id 'com.android.application'
}

android {
    namespace 'com.leonardo.burbujagpt'
    compileSdk 35

    defaultConfig {
        applicationId 'com.leonardo.globowhatsapp.nativebubble'
        minSdk 24
        targetSdk 35
        versionCode 30
        versionName '3.0-native-no-shizuku'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
