plugins {
    id 'com.android.application'
}

android {
    namespace 'com.leonardo.burbujagpt'
    compileSdk 35

    defaultConfig {
        applicationId 'com.leonardo.burbujagpt'
        minSdk 24
        targetSdk 35
        versionCode 17
        versionName '1.3.4-adaptada-multichat-anti-collapse'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
